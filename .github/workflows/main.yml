name: test

on:
  push:
    branches:
      - main

jobs:
  build_and_release:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Maximize build disk space
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
      - name: Python
        run: |
          python -m pip install -r requirements.txt  # Adjust this based on your requirements

      - name: Run helper.py with Continuous Disk Space Monitoring
        run: |
          (
            python helper.py &
            helper_pid=$!

            while ps -p $helper_pid > /dev/null; do
              df -h
              sleep 10  # Adjust the interval as needed
            done
          )

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            generated_image.png
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Saving install logs
        uses: actions/upload-artifact@v2
        with:
          name: InstallLogs_${{ github.job }}
          path: |
            bootstrapper*
            installer*
          retention-days: 7
