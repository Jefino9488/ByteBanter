name: OneAPI CPU and GPU Workflow

on:
  push:
    branches:
      - main  # Change this to your main branch

jobs:
  build_and_release:
    runs-on: ubuntu-20.04
    defaults:
      run:
        shell: bash

    strategy:
      matrix:
        architecture: [cpu, gpu]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      runs-on: ubuntu-20.04
        defaults:
          run:
            shell: bash
        steps:
          - uses: actions/checkout@v2
          - name: cache install
            id: cache-install
            uses: actions/cache@v2
            with:
              path: |
                /intel/oneapi/intelpython
              key: install-${{ env.CACHE_NUMBER }}-${{ env.LINUX_AIKIT_URL }}-compiler-tbb-${{ hashFiles('**/scripts/cache_exclude_linux.sh') }}
          - name: install
            if: steps.cache-install.outputs.cache-hit != 'true'
            run: scripts/install_linux_aitools.sh $LINUX_AIKIT_URL
          - name: build
            run: scripts/build_linux_aitools.sh $SAMPLES_TAG
          - name: exclude unused files from cache
            if: steps.cache-install.outputs.cache-hit != 'true'
            run: scripts/cache_exclude_linux.sh

          # Delete the following if you don't want to save install logs
          - name: Saving install logs
            if: steps.cache-install.outputs.cache-hit != 'true'
            uses: actions/upload-artifact@v2
            with:
              name: InstallLogs_${{ github.job }}
              path: |
                bootstrapper*
                installer*
              retention-days: 7

      - name: Run helper.py
        run: python helper.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            image.img
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Delete the following if you don't want to save install logs
      - name: Saving install logs
        uses: actions/upload-artifact@v2
        with:
          name: InstallLogs_${{ github.job }}
          path: |
            bootstrapper*
            installer*
          retention-days: 7

